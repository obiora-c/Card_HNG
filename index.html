<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Advanced Todo Card</title>

<style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    article {
      width: 100%;
      max-width: 500px;
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-left: 6px solid #ccc;
    }

    /* Priority styles */
    .low { border-left-color: green; }
    .medium { border-left-color: orange; }
    .high { border-left-color: red; }

    /* Status styles */
    .completed h3 {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .overdue {
      color: red;
      font-weight: bold;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      background: #eee;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    button {
      padding: 6px 10px;
      cursor: pointer;
    }

    textarea, input, select {
      width: 100%;
      padding: 6px;
      margin-bottom: 8px;
    }
    
    .expand-btn {
      margin-bottom: 10px;

    }

    .collapsible {
      max-height: 60px;
      overflow: hidden;
    }

    .collapsible.expanded {
      max-height: none;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 600px) {
      .row {
        flex-direction: column;
        align-items: flex-start;
      }
    }
</style>
</head>

<body>


  <article id="card" data-testid="test-todo-card">


    <!-- VIEW MODE -->
    <div id="view-mode">

      <div class="row">
        <h3 id="todo-title" data-testid="test-todo-title"></h3>
        <span id="priority-indicator" data-testid="test-todo-priority"></span>
      </div>

      <div id="desc-container"
        data-testid="test-todo-collapsible-section"
        class="collapsible">
        <p id="desc" data-testid="test-todo-description"></p>
      </div>

      <button id="expand-btn"
        data-testid="test-todo-expand-toggle"
        aria-expanded="false"
        aria-controls="desc-container">
        Expand
      </button>

      <div class="row">
        <time id="due-date" data-testid="test-todo-due-date"></time>
        <time id="time-remaining"
          aria-live="polite"
          data-testid="test-todo-time-remaining"></time>
      </div>

      <div id="overdue"
        data-testid="test-todo-overdue-indicator"></div>

      <div class="row">
        <span id="status-text"
          data-testid="test-todo-status"></span>

        <select id="status-control"
          data-testid="test-todo-status-control"
          aria-label="Todo status">
          <option>Pending</option>
          <option>In Progress</option>
          <option>Done</option>
        </select>

        <div>
          <input type="checkbox"
            id="checkbox"
            data-testid="test-todo-complete-toggle"/>
          <label for="checkbox">Complete</label>
        </div>
      </div>

      <div class="tags" data-testid="test-todo-tags">
        <span class="tag" role="listitem" data-testid="test-todo-tag-work">work</span>
        <span class="tag" role="listitem" data-testid="test-todo-tag-urgent">urgent</span>
      </div>

      <div class="actions">
        <button id="edit-btn"
          data-testid="test-todo-edit-button">Edit</button>

        <button data-testid="test-todo-delete-button" onclick="deleteTodo()">Delete</button>
      </div>

    </div>



    <!-- EDIT MODE -->
    <form id="edit-form"
      class="hidden"
      data-testid="test-todo-edit-form">

      <label for="edit-title">Title</label>
      <input id="edit-title"
        data-testid="test-todo-edit-title-input"/>

      <label for="edit-desc">Description</label>
      <textarea id="edit-desc"
        data-testid="test-todo-edit-description-input"></textarea>

      <label for="edit-priority">Priority</label>
      <select id="edit-priority"
        data-testid="test-todo-edit-priority-select">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>

      <label for="edit-date">Due Date</label>
      <input type="datetime-local"
        id="edit-date"
        data-testid="test-todo-edit-due-date-input"/>

      <div class="actions">
        <button type="button"
          id="save-btn"
          data-testid="test-todo-save-button">Save</button>

        <button type="button"
          id="cancel-btn"
          data-testid="test-todo-cancel-button">Cancel</button>
      </div>

    </form>

  </article>



<script>

  let state = {
    title: "HNG task 0 project",
    description: "This is a long description that demonstrates expand and collapse behavior in the todo card component for testing.",
    priority: "High",
    status: "Pending",
    dueDate: new Date(Date.now() + 3600 * 1000 * 24)
  };

  const el = (id) => document.getElementById(id);


  function formatDate(date) {
    return "Due " + date.toLocaleDateString(undefined, {
      month: "short",
      day: "numeric",
      year: "numeric"
    });
  }

  function renderExpandState() {
    const isLong = state.description.length > 100;
    const btn = el("expand-btn");
    const container = el("desc-container");

    if (!isLong) {
      btn.style.display = "none";
      container.classList.remove("collapsible");
    } else {
      btn.style.display = "block";
      container.classList.add("collapsible");
    }
  }

  function updateTime() {
    const timeEl = el("time-remaining");
    const overdueEl = el("overdue");

    if (state.status === "Done") {
      timeEl.textContent = "Completed";
      overdueEl.textContent = "";
      return;
    }

    const diff = state.dueDate - new Date();

    if (diff <= 0) {
      overdueEl.textContent = "Overdue";
      overdueEl.classList.add("overdue");

      const hours = Math.floor(Math.abs(diff) / (1000 * 60 * 60));
      const mins = Math.floor((Math.abs(diff) / (1000 * 60)) % 60);

      if (hours > 0) {
        timeEl.textContent = `Overdue by ${hours} hour${hours > 1 ? "s" : ""}`;
      } else {
        timeEl.textContent = `Overdue by ${mins} minute${mins > 1 ? "s" : ""}`;
      }

      return;
    }

    overdueEl.textContent = "";
    overdueEl.classList.remove("overdue");

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const mins = Math.floor((diff / (1000 * 60)) % 60);

    if (days > 0) {
      timeEl.textContent = `Due in ${days} day${days > 1 ? "s" : ""}`;
    } else if (hours > 0) {
      timeEl.textContent = `Due in ${hours} hour${hours > 1 ? "s" : ""}`;
    } else {
      timeEl.textContent = `Due in ${mins} minute${mins > 1 ? "s" : ""}`;
    }
  }

  function render() {
    el("todo-title").textContent = state.title;
    el("desc").textContent = state.description;

    el("status-control").value = state.status;
    el("status-text").textContent = state.status;

    el("checkbox").checked = state.status === "Done";

    const card = el("card");
    card.className = state.priority.toLowerCase();
    card.classList.remove("completed");

    if (state.status === "Done") {
      card.classList.add("completed");
    }

    el("priority-indicator").textContent = state.priority;

    el("due-date").textContent = formatDate(state.dueDate);
    el("due-date").setAttribute("datetime", state.dueDate.toISOString());

    renderExpandState();
    updateTime();
  }


  setInterval(updateTime, 30000);

  el("checkbox").addEventListener("change", () => {
    state.status = el("checkbox").checked ? "Done" : "Pending";
    render();
  });

  el("status-control").addEventListener("change", () => {
    state.status = el("status-control").value;
    render();
  });

  el("expand-btn").addEventListener("click", () => {
    const container = el("desc-container");
    const expanded = container.classList.toggle("expanded");

    el("expand-btn").setAttribute("aria-expanded", expanded);
    el("expand-btn").textContent = expanded ? "Collapse" : "Expand";
  });

  el("edit-btn").onclick = () => {
    el("view-mode").classList.add("hidden");
    el("edit-form").classList.remove("hidden");

    el("edit-title").value = state.title;
    el("edit-desc").value = state.description;
    el("edit-priority").value = state.priority;
    el("edit-date").value = state.dueDate.toISOString().slice(0,16);
  };

  el("save-btn").onclick = () => {
    state.title = el("edit-title").value;
    state.description = el("edit-desc").value;
    state.priority = el("edit-priority").value;
    state.dueDate = new Date(el("edit-date").value);

    el("edit-form").classList.add("hidden");
    el("view-mode").classList.remove("hidden");

    render();
  };

  el("cancel-btn").onclick = () => {
    el("edit-form").classList.add("hidden");
    el("view-mode").classList.remove("hidden");
  };

  render();

  function deleteTodo() {
    alert("Delete clicked");
  }
  
</script>


</body>
</html>
