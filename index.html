<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo Card</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    article {
      width: 100%;
      max-width: 450px;
      background: white;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    h3 {
      margin: 0;
    }

    .completed {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .badge {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
    }

    .high {
      background: #ffe5e5;
    }

    .status {
      font-weight: bold;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      background: #eee;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    button {
      padding: 6px 10px;
      border: 1px solid #ccc;
      background: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:focus,
    input:focus {
      outline: 2px solid blue;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>

<body>

<article data-testid="test-todo-card">

  
  <div class="top">
    <h3 data-testid="test-todo-title" id="todo-title">
      HNG task 0 project
    </h3>

    <span
      data-testid="test-todo-priority"
      class="badge high"
      aria-label="High priority"
    >
      High
    </span>
  </div>


  <p data-testid="test-todo-description">
    This is a particular project that is needed to Proceed to the next level.
  </p>

  
  <div class="row">
    <time
      data-testid="test-todo-due-date"
      id="due-date"
    ></time>

    <time
      data-testid="test-todo-time-remaining"
      id="time-remaining"
      aria-live="polite"
    ></time>
  </div>

  <!-- Status + Checkbox -->
  <div class="row">
    <span
      data-testid="test-todo-status"
      id="status"
      class="status"
    >
      Pending
    </span>

    <div>
      <input
        type="checkbox"
        id="complete-toggle"
        data-testid="test-todo-complete-toggle"
      />
      <label for="complete-toggle">Mark complete</label>
    </div>
  </div>

  <div
    data-testid="test-todo-tags"
    role="list"
    class="tags"
  >
    <span role="listitem" class="tag" data-testid="test-todo-tag-work">work</span>
    <span role="listitem" class="tag" data-testid="test-todo-tag-urgent">urgent</span>
  </div>

  
  <div class="actions">
    <button
      data-testid="test-todo-edit-button"
      onclick="editTodo()"
    >
      Edit
    </button>

    <button
      data-testid="test-todo-delete-button"
      onclick="deleteTodo()"
    >
      Delete
    </button>
  </div>

</article>

<script>
  const dueDate = new Date(Date.now() + 1000 * 60 * 60 * 24); // ~24 hrs
  const dueDateEl = document.getElementById("due-date");
  const timeRemainingEl = document.getElementById("time-remaining");
  const checkbox = document.getElementById("complete-toggle");
  const statusEl = document.getElementById("status");
  const titleEl = document.getElementById("todo-title");

  function formatDueDate(date) {
    return "Due " + date.toLocaleDateString(undefined, {
      month: "short",
      day: "numeric",
      year: "numeric"
    });
  }

  function getTimeRemaining() {
    const now = new Date();
    const diff = dueDate - now;

    if (diff <= 0) {
      const hours = Math.floor(Math.abs(diff) / (1000 * 60 * 60));
      if (hours === 0) return "Due now!";
      return `Overdue by ${hours} hour${hours > 1 ? "s" : ""}`;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);

    if (days > 0) return `Due in ${days} day${days > 1 ? "s" : ""}`;
    if (hours > 0) return `Due in ${hours} hour${hours > 1 ? "s" : ""}`;

    return "Due now!";
  }

  function updateTime() {
    timeRemainingEl.textContent = getTimeRemaining();
  }

  dueDateEl.textContent = formatDueDate(dueDate);
  dueDateEl.setAttribute("datetime", dueDate.toISOString());

  updateTime();
  setInterval(updateTime, 60000);

  checkbox.addEventListener("change", () => {
    if (checkbox.checked) {
      statusEl.textContent = "Done";
      titleEl.classList.add("completed");
    } else {
      statusEl.textContent = "Pending";
      titleEl.classList.remove("completed");
    }
  });

  function editTodo() {
    console.log("edit clicked");
  }

  function deleteTodo() {
    alert("Delete clicked");
  }
</script>

</body>
</html>
